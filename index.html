<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koding Festival - SMP IT Ummul Quro Depok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf0;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            /* Menggunakan dvh agar tinggi layar dinamis mengikuti UI browser mobile */
            height: 100dvh;
            overflow: hidden;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        .slide { 
            display: none; 
            width: 100%;
            max-width: 800px;
            /* Maksimal tinggi slide agar ada ruang untuk footer di bawah */
            max-height: 85%; 
            transition: all 0.5s ease;
            overflow-y: auto; /* Jika teks sangat panjang, bagian dalam kartu bisa di-scroll */
            -webkit-overflow-scrolling: touch;
        }

        .slide.active { 
            display: flex; 
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .pastel-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 4px solid #ffffff;
            border-radius: 35px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.05);
            width: 100%;
            margin: auto;
        }

        .floating-icon { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-nav { 
            background: white; 
            border: 2px solid #e2e8f0; 
            padding: 0.8rem; 
            border-radius: 9999px; 
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nav:disabled { opacity: 0.2; }

        footer {
            padding: 1rem 1.5rem;
            /* Memberikan ruang aman untuk gesture bar pada iPhone/Android modern */
            padding-bottom: calc(1rem + env(safe-area-inset-bottom)); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .theme-title { background-color: #F0F4FF; }
        .theme-app { background-color: #E0F2F1; }
        .theme-collect { background-color: #FFEBEE; }
        .theme-thanks { background-color: #F5F5F5; }

        /* Penyesuaian khusus Mobile */
        @media (max-width: 640px) {
            h1 { font-size: 2.25rem !important; line-height: 1.2 !important; }
            .slide-text-main { font-size: 1.25rem !important; }
            .pastel-card { padding: 2rem 1.25rem !important; border-radius: 30px; }
            .app-desc-box { padding: 1rem !important; }
        }
    </style>
</head>
<body>

    <main>
        <div class="slide theme-title pastel-card p-10 flex-col items-center justify-center text-center">
            <i class="fa-solid fa-laptop-code text-blue-500 text-6xl mb-6 floating-icon"></i>
            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-800 mb-2">Koding Festival</h1>
            <p class="text-lg md:text-2xl font-bold text-slate-400 uppercase tracking-widest slide-text-main">SMP IT Ummul Quro Depok</p>
        </div>

        <div id="slide-group" class="slide theme-app pastel-card p-10 flex-col items-center justify-center text-center">
            <div id="groupNum" class="text-teal-600 font-bold mb-2 uppercase tracking-tighter text-xs"></div>
            <div id="appIconContainer" class="text-6xl mb-4 floating-icon"></div>
            <h1 id="appName" class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-3"></h1>
            <p id="studentNames" class="text-lg md:text-2xl font-medium text-slate-500 mb-6"></p>
            <div class="bg-white/60 p-5 rounded-3xl border-2 border-white app-desc-box">
                <p id="appDesc" class="text-base md:text-xl italic text-slate-700"></p>
            </div>
        </div>

        <div class="slide theme-collect pastel-card p-8 flex-col text-center">
            <h2 class="text-3xl font-extrabold text-rose-600 mb-6">Pengumpulan Tugas 🚀</h2>
            <div class="text-left bg-white/50 p-5 rounded-2xl mb-6 border border-rose-100">
                <p class="font-bold text-slate-800 mb-2 text-sm">Wajib dikumpulkan:</p>
                <ul class="text-sm space-y-2 text-slate-600">
                    <li><i class="fa-solid fa-check text-rose-500 mr-2"></i> Link Aplikasi MIT Gallery</li>
                    <li><i class="fa-solid fa-check text-rose-500 mr-2"></i> File Presentasi (PPT/Canva)</li>
                    <li><i class="fa-solid fa-check text-rose-500 mr-2"></i> Video Demo & Pitch Deck</li>
                </ul>
            </div>
            <a href="https://drive.google.com/drive/folders/1l0fDAJUJFQUm2NG-7yrpp6wlmBzVOdwW?usp=sharing" target="_blank" class="bg-rose-500 text-white w-full py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                <i class="fa-brands fa-google-drive mr-2"></i> Buka Folder Drive
            </a>
        </div>

        <div class="slide theme-thanks pastel-card p-12 flex-col items-center justify-center text-center">
            <i class="fa-solid fa-heart text-rose-400 text-6xl mb-6 floating-icon"></i>
            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-800">Terima Kasih!</h1>
            <p class="text-slate-400 font-bold mt-2">Selamat Berjuang!</p>
        </div>
    </main>

    <footer>
        <button id="prevBtn" class="btn-nav"><i class="fa-solid fa-chevron-left text-slate-600"></i></button>
        <span id="slideIndicator" class="text-slate-400 font-bold text-sm font-mono">01 / 13</span>
        <button id="nextBtn" class="btn-nav"><i class="fa-solid fa-chevron-right text-slate-600"></i></button>
    </footer>

    <script>
        const groups = [
            {n: "Kelompok 1", a: "Money Hero", s: "Wafi dan Mirza", d: "Membantu pelajar mengelola uang sehari-hari", i: "fa-shield-halved", c: "#2dd4bf"},
            {n: "Kelompok 2", a: "Monefy", s: "Nanda dan Milan", d: "Untuk mencatat pengeluaran harian", i: "fa-wallet", c: "#fb923c"},
            {n: "Kelompok 3", a: "Envelopia", s: "Ezhar dan Khalid", d: "Mengontrol pengeluaran per-katagori", i: "fa-envelope-open-text", c: "#c084fc"},
            {n: "Kelompok 4", a: "My Tabungan", s: "Rakha dan Ashkii", d: "Estimasi waktu menabung sesuai pengeluaran", i: "fa-piggy-bank", c: "#60a5fa"},
            {n: "Kelompok 5", a: "My Celengan", s: "Danish", d: "Untuk mencatat tabungan pribadi", i: "fa-coins", c: "#4ade80"},
            {n: "Kelompok 6", a: "Finance Notes", s: "Alvin dan Lutfi", d: "Untuk mencatat setiap pengeluaran", i: "fa-file-invoice-dollar", c: "#818cf8"},
            {n: "Kelompok 7", a: "Business Control", s: "Rafa dan Arya", d: "Untuk menghitung modal usaha", i: "fa-chart-line", c: "#f472b6"},
            {n: "Kelompok 8", a: "Bank Nugraha", s: "Navra dan Izzan", d: "Aplikasi perbankan masa depan", i: "fa-building-columns", c: "#a8a29e"},
            {n: "Kelompok 9", a: "Bank Farhan Mumtaz", s: "Farhan dan Ziyad", d: "Solusi perbankan syariah digital", i: "fa-vault", c: "#22d3ee"},
            {n: "Kelompok 10", a: "Creative Project", s: "Fatan dan Itsar", d: "Aplikasi sedang dikembangkan", i: "fa-rocket", c: "#f87171"}
        ];

        let currentSlide = 0;
        const totalSlidesCount = 13;

        function updateSlide() {
            const allSlides = document.querySelectorAll('.slide');
            const groupSlide = document.getElementById('slide-group');
            allSlides.forEach(s => s.classList.remove('active'));

            if (currentSlide === 0) {
                allSlides[0].classList.add('active'); 
            } else if (currentSlide >= 1 && currentSlide <= 10) {
                const g = groups[currentSlide - 1];
                document.getElementById('groupNum').innerText = g.n;
                document.getElementById('appName').innerText = g.a;
                document.getElementById('studentNames').innerText = g.s;
                document.getElementById('appDesc').innerText = g.d;
                document.getElementById('appIconContainer').innerHTML = `<i class="fa-solid ${g.i}" style="color: ${g.c}"></i>`;
                groupSlide.classList.add('active');
            } else if (currentSlide === 11) {
                allSlides[2].classList.add('active');
            } else {
                allSlides[3].classList.add('active');
            }

            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlidesCount - 1;
            document.getElementById('slideIndicator').innerText = `${(currentSlide + 1).toString().padStart(2, '0')} / ${totalSlidesCount}`;
            
            // Reset scroll posisi slide ke atas setiap ganti halaman
            allSlides.forEach(s => s.scrollTop = 0);
        }

        document.getElementById('nextBtn').addEventListener('click', () => { if(currentSlide < totalSlidesCount - 1) { currentSlide++; updateSlide(); } });
        document.getElementById('prevBtn').addEventListener('click', () => { if(currentSlide > 0) { currentSlide--; updateSlide(); } });
        
        updateSlide();
    </script>
</body>
</html>
